<div class="min-h-screen bg-stone-100 text-zinc-950 transition-colors dark:bg-zinc-950 dark:text-stone-50">
  <mat-toolbar class="sticky top-0 z-30 border-b border-black/10 bg-white/90 backdrop-blur dark:border-white/10 dark:bg-zinc-950/85">
    <a routerLink="/menu" class="flex items-center gap-2 text-base font-extrabold tracking-normal text-leaf dark:text-emerald-300">
      <mat-icon>local_dining</mat-icon>
      <span>Restaurant Enterprise</span>
    </a>

    <nav class="ml-6 hidden items-center gap-1 md:flex">
      @for (link of links(); track link.path) {
        <a mat-button [routerLink]="link.path" routerLinkActive="active-link" class="nav-link">
          <mat-icon>{{ link.icon }}</mat-icon>
          {{ link.label }}
        </a>
      }
    </nav>

    <span class="flex-1"></span>

    <mat-slide-toggle
      [checked]="theme.darkMode()"
      (change)="theme.setDarkMode($event.checked)"
      aria-label="Dark mode"
      class="mr-2"
    />

    @if (auth.user(); as user) {
      <button mat-button [matMenuTriggerFor]="accountMenu">
        <mat-icon>account_circle</mat-icon>
        <span class="hidden sm:inline">{{ user.fullName }}</span>
      </button>
      <mat-menu #accountMenu="matMenu">
        <button mat-menu-item disabled>
          <mat-icon>badge</mat-icon>
          <span>{{ user.role }}</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    } @else {
      <a mat-flat-button color="primary" routerLink="/auth">
        <mat-icon>login</mat-icon>
        Login
      </a>
    }
  </mat-toolbar>

  <nav class="grid grid-cols-5 gap-1 border-b border-black/10 bg-white px-2 py-2 md:hidden dark:border-white/10 dark:bg-zinc-900">
    @for (link of links(); track link.path) {
      <a mat-button [routerLink]="link.path" routerLinkActive="active-link" class="mobile-nav">
        <mat-icon>{{ link.icon }}</mat-icon>
        <span>{{ link.label }}</span>
      </a>
    }
  </nav>

  <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <router-outlet />
  </main>
</div>
